<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade Hub</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 { margin-bottom: 20px; }

.btn {
  width: 240px;
  padding: 12px;
  margin: 8px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-size: 15px;
}

.g1 { background:#22c55e; }
.g2 { background:#3b82f6; }
.g3 { background:#f97316; }
.g4 { background:#a855f7; }

#game { display:none; }

canvas {
  width:100vw;
  height:100vh;
  display:block;
}

#back {
  position:absolute;
  top:10px;
  left:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎮 ARCADE HUB</h1>
  <button class="btn g1" onclick="start(1)">🟢 Esquiva Enemigos (WASD)</button>
  <button class="btn g2" onclick="start(2)">🔵 Atrapa Monedas</button>
  <button class="btn g3" onclick="start(3)">🟠 Snake Simple</button>
  <button class="btn g4" onclick="start(4)">🚀 Viaje a la Luna</button>
</div>

<!-- GAME -->
<div id="game">
  <button id="back" onclick="location.reload()">← Menú</button>
  <canvas id="c"></canvas>
</div>

<script>

let c = document.getElementById("c");
let ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
window.addEventListener("resize", resize);

/* CONTROLES WASD */
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/* MENU */
function start(g){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  resize();

  if(g===1) game1();
  if(g===2) game2();
  if(g===3) game3();
  if(g===4) game4();
}

/* =====================
   JUEGO 1: ENEMIGOS WASD
===================== */
function game1(){

  let p = {x:200,y:200};
  let enemies = [];

  function loop(){
    ctx.fillStyle="#0f172a";
    ctx.fillRect(0,0,c.width,c.height);

    // movimiento WASD
    if(keys["w"]) p.y-=5;
    if(keys["s"]) p.y+=5;
    if(keys["a"]) p.x-=5;
    if(keys["d"]) p.x+=5;

    // jugador
    ctx.fillStyle="#22c55e";
    ctx.fillRect(p.x,p.y,20,20);

    // enemigos
    if(Math.random()<0.03){
      enemies.push({x:Math.random()*c.width,y:0});
    }

    ctx.fillStyle="red";
    for(let i=0;i<enemies.length;i++){
      enemies[i].y += 4;
      ctx.fillRect(enemies[i].x,enemies[i].y,20,20);

      // colisión
      if(Math.abs(enemies[i].x-p.x)<20 &&
         Math.abs(enemies[i].y-p.y)<20){
        alert("💥 GAME OVER");
        location.reload();
      }
    }

    requestAnimationFrame(loop);
  }
  loop();
}

/* =====================
   JUEGO 2: MONEDAS
===================== */
function game2(){

  let p = {x:200,y:200};
  let coins = [];
  let score = 0;

  function loop(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,c.width,c.height);

    if(keys["w"]) p.y-=5;
    if(keys["s"]) p.y+=5;
    if(keys["a"]) p.x-=5;
    if(keys["d"]) p.x+=5;

    ctx.fillStyle="#3b82f6";
    ctx.fillRect(p.x,p.y,20,20);

    if(Math.random()<0.05){
      coins.push({x:Math.random()*c.width,y:Math.random()*c.height});
    }

    for(let i=0;i<coins.length;i++){
      ctx.fillStyle="yellow";
      ctx.beginPath();
      ctx.arc(coins[i].x,coins[i].y,8,0,Math.PI*2);
      ctx.fill();

      if(Math.abs(coins[i].x-p.x)<20 &&
         Math.abs(coins[i].y-p.y)<20){
        coins.splice(i,1);
        score+=10;
      }
    }

    ctx.fillStyle="white";
    ctx.fillText("Score: "+score,10,20);

    requestAnimationFrame(loop);
  }
  loop();
}

/* =====================
   JUEGO 3: SNAKE
===================== */
function game3(){

  let snake=[{x:100,y:100}];
  let dir="right";

  document.onkeydown = e=>{
    if(e.key==="ArrowUp") dir="up";
    if(e.key==="ArrowDown") dir="down";
    if(e.key==="ArrowLeft") dir="left";
    if(e.key==="ArrowRight") dir="right";
  };

  function loop(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,c.width,c.height);

    let h={...snake[0]};

    if(dir==="right")h.x+=10;
    if(dir==="left")h.x-=10;
    if(dir==="up")h.y-=10;
    if(dir==="down")h.y+=10;

    snake.unshift(h);
    snake.pop();

    ctx.fillStyle="#22c55e";
    snake.forEach(s=>{
      ctx.fillRect(s.x,s.y,10,10);
    });

    requestAnimationFrame(loop);
  }
  loop();
}

/* =====================
   JUEGO 4: COHETE A LA LUNA
===================== */
function game4(){

  let rocket = {x:200,y:500,vy:0};
  let fuel = 100;

  let obstacles = [];
  let meteors = [];
  let distance = 0;
  let speed = 1;

  let moonY = -5000; // muy arriba → viaje largo

  function spawn(){
    if(Math.random()<0.08){
      obstacles.push({
        x:Math.random()*c.width,
        y:-50,
        w:40,
        h:40
      });
    }

    if(Math.random()<0.1){
      meteors.push({
        x:Math.random()*c.width,
        y:-50,
        vy:3+Math.random()*3
      });
    }
  }

  function loop(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,c.width,c.height);

    spawn();

    // movimiento WASD
    if(keys["w"] && fuel>0){
      rocket.vy -= 0.3;
      fuel -= 0.2;
    }
    if(keys["a"]) rocket.x -= 5;
    if(keys["d"]) rocket.x += 5;

    rocket.vy += 0.05;
    rocket.y += rocket.vy;

    // scroll del mundo (simula subida)
    distance += speed;

    // ROCKET
    ctx.fillStyle="orange";
    ctx.fillRect(rocket.x,rocket.y,20,40);

    // OBSTÁCULOS
    ctx.fillStyle="red";
    for(let i=0;i<obstacles.length;i++){
      obstacles[i].y += speed+2;

      ctx.fillRect(
        obstacles[i].x,
        obstacles[i].y,
        obstacles[i].w,
        obstacles[i].h
      );

      // colisión
      if(
        rocket.x < obstacles[i].x + 40 &&
        rocket.x + 20 > obstacles[i].x &&
        rocket.y < obstacles[i].y + 40 &&
        rocket.y + 40 > obstacles[i].y
      ){
        mostrarGameOver("💥 Chocaste con un obstáculo");
        return;
      }
    }

    // METEORITOS
    ctx.fillStyle="white";
    for(let i=0;i<meteors.length;i++){
      meteors[i].y += meteors[i].vy;

      ctx.beginPath();
      ctx.arc(meteors[i].x, meteors[i].y, 8, 0, Math.PI*2);
      ctx.fill();

      if(
        rocket.x < meteors[i].x + 10 &&
        rocket.x + 20 > meteors[i].x &&
        rocket.y < meteors[i].y + 10 &&
        rocket.y + 40 > meteors[i].y
      ){
        mostrarGameOver("☄️ Impacto de meteorito");
        return;
      }
    }

    // LUNA (meta)
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(c.width/2, moonY + distance, 60, 0, Math.PI*2);
    ctx.fill();

    // HUD
    ctx.fillStyle="white";
    ctx.fillText("Combustible: " + fuel.toFixed(0),10,20);
    ctx.fillText("Distancia: " + distance.toFixed(0),10,40);

    // victoria tras ~3 min simulados
    if(distance > 5000){
      mostrarGameOver("🌙 ¡HAS LLEGADO A LA LUNA!");
      return;
    }

    requestAnimationFrame(loop);
  }

  loop();
}

</script>

</body>
</html>
